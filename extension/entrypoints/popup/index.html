<!doctype html>
<html>
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="stylesheet" href="./style.css" />
    <title>UnderPixel</title>
  </head>
  <body>
    <div id="app">
      <header>
        <h1>UnderPixel</h1>
        <span id="status" class="status disconnected">Disconnected</span>
      </header>

      <section id="connection-section">
        <p id="server-info">Bridge not connected</p>
      </section>

      <!-- Shown when connected -->
      <section id="capture-section" class="hidden">
        <button id="capture-btn" class="btn">Start Capture</button>
        <div id="capture-stats" class="stats hidden">
          <div>API calls: <span id="stat-requests">0</span></div>
          <div>Screenshots: <span id="stat-screenshots">0</span></div>
          <div>Correlations: <span id="stat-correlations">0</span></div>
        </div>
        <button id="replay-btn" class="btn btn-replay hidden">View Replay</button>
      </section>

      <section id="screenshot-section" class="hidden">
        <div class="settings-card">
          <h3>Screenshot Settings</h3>
          <label class="setting-row">
            <span>Auto-screenshots</span>
            <input type="checkbox" id="screenshots-enabled" checked />
          </label>
          <label class="setting-row">
            <span>Max per session</span>
            <input type="number" id="max-screenshots" value="100" min="1" max="1000" class="setting-input" />
          </label>
          <label class="setting-row">
            <span>Min interval (ms)</span>
            <input type="number" id="screenshot-interval" value="500" min="100" max="5000" step="100" class="setting-input" />
          </label>
          <label class="setting-row">
            <span>Diff threshold (%)</span>
            <input type="number" id="diff-threshold" value="1" min="0.1" max="50" step="0.1" class="setting-input" />
          </label>
        </div>
      </section>

      <!-- Setup instructions, shown when connected -->
      <section id="setup-section" class="hidden">
        <div class="setup-card">
          <h3>Connect to your AI assistant</h3>

          <details class="client-section" open>
            <summary>Claude Code</summary>
            <p class="setup-hint">Run this once in your terminal, then restart Claude Code:</p>
            <div class="code-block">
              <code id="mcp-cmd"></code>
              <button id="copy-cmd-btn" class="btn-copy">Copy</button>
            </div>
          </details>

          <details class="client-section">
            <summary>Other MCP clients (Cursor, Windsurf, etc.)</summary>
            <p class="setup-hint">Add to your MCP client config:</p>
            <div class="code-block">
              <pre id="mcp-json"></pre>
              <button id="copy-json-btn" class="btn-copy">Copy</button>
            </div>
          </details>
        </div>
      </section>

      <section id="data-section" class="hidden">
        <button id="clear-btn" class="btn btn-danger">Clear All Data</button>
      </section>
    </div>
    <script src="./main.ts" type="module"></script>
  </body>
</html>
